[tox]
envlist = py38, py39, py310, py311, py312, lint, mypy
minversion = 4.0
skipsdist = true

[testenv]
description = 运行单元测试
package = wheel
wheel_build_env = .pkg
deps =
    pytest>=7
    pytest-cov>=5
commands =
    pytest {posargs:-v --cov=src/data_toolbox --cov-report=term-missing}

[testenv:lint]
description = 代码风格检查
deps = ruff>=0.5
commands = ruff check .

[testenv:fmt]
description = 代码格式化检查
deps = ruff>=0.5
commands = ruff format --check .

[testenv:mypy]
description = 类型检查
deps = mypy>=1
commands = mypy src/data_toolbox
